<htmlcode>
    <div id="root">
        <section id="gallery" class="py-20 bg-neutral-100">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16 animate__animated animate__fadeIn">
                    <h2 class="text-3xl md:text-4xl font-bold text-neutral-900 mb-4">
                        Gallery
                    </h2>
                    <p class="text-neutral-600 text-lg">Capture the beauty of Alleppey's backwaters</p>
                    <div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="galleryGrid">
                    <!-- Gallery Item 1 -->
                    <div class="relative group overflow-hidden rounded-lg cursor-pointer animate__animated animate__fadeIn"
                        onclick="openLightbox(this)">
                        <img src="images/intro-alleppy.jpg" alt="Alleppey Kayaking"
                            class="w-full h-64 object-cover transition-transform duration-300 group-hover:scale-110">
                        <div
                            class="absolute inset-0 bg-black bg-opacity-40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                    </div>

                    <!-- Gallery Item 2 -->
                    <div class="relative group overflow-hidden rounded-lg cursor-pointer animate__animated animate__fadeIn"
                        onclick="openLightbox(this)">
                        <img src="images/intro-kochi.jpg" alt="Kayaking Experience"
                            class="w-full h-64 object-cover transition-transform duration-300 group-hover:scale-110">
                        <div
                            class="absolute inset-0 bg-black bg-opacity-40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                    </div>

                    <!-- Gallery Item 3 -->
                    <div class="relative group overflow-hidden rounded-lg cursor-pointer animate__animated animate__fadeIn"
                        onclick="openLightbox(this)">
                        <img src="images/intro-alleppy.jpg" alt="Backwaters View"
                            class="w-full h-64 object-cover transition-transform duration-300 group-hover:scale-110">
                        <div
                            class="absolute inset-0 bg-black bg-opacity-40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                            <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Lightbox -->
            <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-90 hidden z-50">
                <button onclick="closeLightbox()" class="absolute top-4 right-4 text-white">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
                <div class="flex items-center justify-center h-full">
                    <img id="lightbox-img" src="images/https:-secret-routes-kayayagt.rollout.site" alt="Gallery Image"
                        class="max-h-[90vh] max-w-[90vw] object-contain">
                </div>
            </div>
        </section>

        <script>
            function openLightbox(element) {
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                const img = element.querySelector('img');
                lightboxImg.src = img.src;
                lightbox.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function closeLightbox() {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }

            // Close lightbox on escape key
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') {
                    closeLightbox();
                }
            });

            // Close lightbox when clicking outside the image
            document.getElementById('lightbox').addEventListener('click', function (e) {
                if (e.target === this) {
                    closeLightbox();
                }
            });
        </script>
    </div>
</htmlcode>



<htmlcode>
    <div id="root">
        <section id="bookingForm" class="py-20 bg-neutral-100">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-16 animate__animated animate__fadeIn">
                    <h2 class="text-3xl md:text-4xl font-bold text-neutral-900 mb-4">
                        Book Your Kayaking Adventure
                    </h2>
                    <p class="text-neutral-600 text-lg">Reserve your spot for an unforgettable experience</p>
                    <div class="w-24 h-1 bg-blue-600 mx-auto mt-4"></div>
                </div>

                <form id="kayakingBookingForm"
                    class="bg-white rounded-lg shadow-xl p-8 animate__animated animate__fadeInUp">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Full Name -->
                        <div class="col-span-2 md:col-span-1">
                            <label for="fullName" class="block text-neutral-700 font-medium mb-2">Full Name *</label>
                            <input type="text" id="fullName" name="fullName" required
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200"
                                placeholder="Enter your full name">
                        </div>

                        <!-- WhatsApp Number -->
                        <div class="col-span-2 md:col-span-1">
                            <label for="whatsapp" class="block text-neutral-700 font-medium mb-2">WhatsApp Number
                                *</label>
                            <input type="tel" id="whatsapp" name="whatsapp" required
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200"
                                placeholder="Enter your WhatsApp number">
                        </div>

                        <!-- Email -->
                        <div class="col-span-2">
                            <label for="email" class="block text-neutral-700 font-medium mb-2">Email Address *</label>
                            <input type="email" id="email" name="email" required
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200"
                                placeholder="Enter your email address">
                        </div>

                        <!-- Travel Date -->
                        <div class="col-span-2 md:col-span-1">
                            <label for="travelDate" class="block text-neutral-700 font-medium mb-2">Date of Travel
                                *</label>
                            <input type="date" id="travelDate" name="travelDate" required
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200">
                        </div>

                        <!-- Number of People -->
                        <div class="col-span-2 md:col-span-1">
                            <label for="people" class="block text-neutral-700 font-medium mb-2">Number of People
                                *</label>
                            <select id="people" name="people" required
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200">
                                <option value="">Select number of people</option>
                                <option value="1">1 Person</option>
                                <option value="2">2 People</option>
                                <option value="3">3 People</option>
                                <option value="4">4 People</option>
                                <option value="5">5+ People</option>
                            </select>
                        </div>

                        <!-- Message -->
                        <div class="col-span-2">
                            <label for="message" class="block text-neutral-700 font-medium mb-2">Additional
                                Message</label>
                            <textarea id="message" name="message" rows="4"
                                class="w-full px-4 py-3 rounded-lg border border-neutral-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition duration-200"
                                placeholder="Any special requests or questions?"></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="col-span-2">
                            <button type="submit"
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition duration-300 transform hover:scale-[1.02]">
                                Book Now
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <script>
            document.getElementById('kayakingBookingForm').addEventListener('submit', function (e) {
                e.preventDefault();

                // Basic form validation
                const required = ['fullName', 'whatsapp', 'email', 'travelDate', 'people'];
                let isValid = true;

                required.forEach(field => {
                    const element = document.getElementById(field);
                    if (!element.value) {
                        element.classList.add('border-red-500');
                        isValid = false;
                    } else {
                        element.classList.remove('border-red-500');
                    }
                });

                if (!isValid) {
                    alert('Please fill in all required fields');
                    return;
                }

                // Here you would typically send the form data to your server
                alert('Thank you for your booking request! We will contact you shortly.');
                this.reset();
            });

            // Date input minimum date setting
            const dateInput = document.getElementById('travelDate');
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            dateInput.min = tomorrow.toISOString().split('T')[0];
        </script>
    </div>
</htmlcode>
